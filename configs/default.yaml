# GRL-EA 默认超参数配置

# 问题参数
problem:
  num_agv: 3
  speed_levels: [1.0, 1.5, 2.0]  # m/s
  # AGV载货功率模型 P_load(v) = alpha1*v^2 + beta1*v + gamma1
  agv_load_power:
    alpha: 0.08
    beta: 0.15
    gamma: 0.12
  # AGV空载功率模型
  agv_empty_power:
    alpha: 0.05
    beta: 0.10
    gamma: 0.08
  # 机器能耗参数范围
  machine_proc_power_range: [3.0, 8.0]   # kW
  machine_idle_power_range: [0.5, 2.0]   # kW
  machine_setup_power_range: [1.5, 4.0]  # kW
  machine_setup_time_range: [2, 8]       # 时间单位
  # 距离参数
  distance_range: [5, 50]  # 机器间距离 m

# NSGA-III 参数
nsga3:
  pop_size: 200
  max_gen: 500
  tournament_size: 5
  ref_point_divisions: 8  # Das-Dennis p参数
  archive_size: 100

# HAT 编码器参数
hat:
  hidden_dim: 64
  num_heads: 4
  num_layers: 3
  dropout: 0.1

# PPO 参数
ppo:
  lr: 3.0e-4
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  n_epochs: 4
  batch_size: 64
  buffer_size: 2048

# GRL 模块参数
grl:
  module_a:
    num_operators: 10
    top_k_pop: 5       # 编码种群Top-K个解
    stagnation_penalty: -0.1
    stagnation_threshold: 5
  module_b:
    top_k_improve: 20  # 改进Top-K个解
    max_improve_steps: 5
    max_critical_ops: 10
    max_candidates: 3
    reward_weights: [0.4, 0.4, 0.2]  # f1, f2, f3

# 动态响应参数
dynamic:
  theta1: 0.15
  theta2: 0.40
  disruption_weights: [0.30, 0.25, 0.30, 0.15]  # w1-w4
  local_reschedule:
    pop_size: 50
    max_gen: 100
  global_reschedule:
    pop_size: 100
    max_gen: 200

# 动态事件参数
events:
  new_job_arrival_rate: [0.1, 0.2, 0.3, 0.5]
  machine_breakdown_rate: [0.01, 0.02, 0.05]
  machine_repair_time: [5, 20]
  agv_breakdown_rate: [0.01, 0.03]
  agv_repair_time: [3, 15]

# 预训练参数
pretrain:
  num_instances: 50
  ea_generations: 100
  epochs: 50
